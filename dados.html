<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dados</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-body-secondary">

<div class="d-flex">

    <!-- Barra lateral -->
    <aside class="bg-info vh-100 d-flex flex-column justify-content-between align-items-center py-4 px-3">

        <img src="img/Logo (1).png" width="40">

        <a href="index.html"
           class="btn btn-primary rounded-4">
            ←
        </a>

    </aside>


    <!-- Conteúdo -->
    <main class="container py-4">

        <h5 class="text-secondary text-center mb-4">
            Adicione um orfanato
        </h5>

        <div class="card border-0 rounded-5 shadow-sm mx-auto p-5"
             style="max-width:700px;">

            <!-- Dados -->
            <h1 class="mb-4">Dados</h1>

            <hr>

            <img src="img/mapa.png"
                 class="img-fluid rounded-4 mb-4">

            <div class="mb-4">
                <label class="form-label">
                    Nome
                </label>

                <input
                    type="text"
                    class="form-control rounded-4">
            </div>


            <div class="mb-4">

                <label class="form-label">
                    Sobre
                </label>

                <textarea
                    class="form-control rounded-4"
                    rows="4"></textarea>

            </div>


            <div class="mb-5">

                <label class="form-label">
                    Número de Whatsapp
                </label>

                <input
                    type="text"
                    class="form-control rounded-4">

            </div>

            <div class="mb-5">

    <label class="form-label">
        Fotos
    </label>

    <div
        class="border border-info border-opacity-50 border-2 rounded-4 d-flex justify-content-center align-items-center"
        style="width: 120px; height: 120px; border-style: dashed !important;">

        <button
            type="button"
            class="btn btn-link text-info text-decoration-none fs-1">

            +

        </button>

    </div>

</div>


            <h1 class="mb-4">
                Visitação
            </h1>

            <hr>


            <div class="mb-4">

                <label class="form-label">
                    Instruções
                </label>

                <textarea
                    class="form-control rounded-4"
                    rows="4"></textarea>

            </div>


            <div class="mb-4">

                <label class="form-label">
                    Horário das visitas
                </label>

                <input
                    type="text"
                    class="form-control rounded-4">

            </div>


            <div class="d-flex justify-content-between align-items-center mb-5">

    <label class="form-label mb-0">
        Atende fim de semana?
    </label>

    <div class="form-check form-switch">

        <input
            class="form-check-input"
            type="checkbox">

    </div>

</div>


            <button class="btn btn-success rounded-4 w-100 py-3 fw-bold">

                Confirmar

            </button>

        </div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
